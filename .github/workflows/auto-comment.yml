name: Auto Comment on Issue Open
# This reusable workflow posts a redirect comment on newly-opened issues,
# telling students to transfer the issue to the correct lab submission repo.
#
# Lab repos follow the naming convention: YEAR-lab_NN
# (e.g. DataScience4Psych/2026-lab_10)
#
# ── Reusable workflow ────────────────────────────────────────────────────────
# Call from a lab repo's own workflow (or from classroom.yml) like this:
#
#   # .github/workflows/auto-comment.yml  (in a lab repo, e.g. 2026-lab_10)
#   name: Auto Comment
#   on:
#     issues:
#       types: [opened]
#   jobs:
#     comment:
#       uses: DataScience4Psych/actions/.github/workflows/auto-comment.yml@main
#       with:
#         lab_number: '10'      # optional — auto-detected from repo name if omitted
#       secrets: inherit
#
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      lab_number:
        description: 'Lab number (e.g. "10"). Leave blank to auto-detect from the repo name.'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      lab_number:
        description: 'Lab number (e.g. "10"). Leave blank to auto-detect from the repo name.'
        required: false
        type: string
        default: ''
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    # Skip bots (e.g. github-classroom[bot]) to avoid comment spam.
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Post redirect comment
        uses: actions/github-script@v7
        env:
          INPUT_LAB_NUMBER: ${{ inputs.lab_number }}
        with:
          script: |
            // 1. Determine the lab number from input or from the repo name.
            let labNum = (process.env.INPUT_LAB_NUMBER || '').trim();

            if (!labNum) {
              // Auto-detect from repo name.
              // Accepts YEAR-lab_NN, lab-NN-title, labNN, etc.
              const repoName = context.repo.repo;
              const match = repoName.match(/lab[_-]?(\d+)/i);
              if (match) {
                labNum = match[1];
              }
            }

            if (!labNum) {
              core.setFailed(
                'Could not determine the lab number. ' +
                'Pass it explicitly via the lab_number input or name the repo following ' +
                'the YEAR-lab_NN convention.'
              );
              return;
            }

            // Validate that labNum is a non-negative integer.
            const labNumInt = parseInt(labNum, 10);
            if (!Number.isInteger(labNumInt) || labNumInt < 0) {
              core.setFailed(`Invalid lab_number "${labNum}": must be a non-negative integer.`);
              return;
            }

            // 2. Build the transfer URL using the current calendar year (UTC).
            const year = new Date().getUTCFullYear();
            const paddedNum = String(labNumInt).padStart(2, '0');
            const labRepo  = `${year}-lab_${paddedNum}`;
            const owner    = context.repo.owner;
            const transferUrl = `https://github.com/${owner}/${labRepo}/issues`;

            // 3. Compose and post the comment.
            const author = context.payload.issue.user.login;
            const body = [
              `👋 @${author}`,
              `Thank you for raising an issue. If you are trying to submit a lab, ` +
              `you should transfer this issue to [${labRepo}](${transferUrl}). ` +
              `Otherwise, your lab won't be added to Prof. Mason's to-grade list. ` +
              `Until then, no one will know that you're ready to receive feedback!`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body
            });
