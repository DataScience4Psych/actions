name: Auto Comment on Issue Open
# This reusable workflow posts a redirect comment on newly-opened issues,
# telling students to transfer the issue to the correct lab submission repo.
#
# Lab repos follow the naming convention: YEAR-lab_NN
# (e.g. DataScience4Psych/2026-lab_10)
#
# ── Reusable workflow ────────────────────────────────────────────────────────
# Call from a lab repo's own workflow (or from classroom.yml) like this:
#
#   # .github/workflows/auto-comment.yml  (in a lab repo, e.g. 2026-lab_10)
#   name: Auto Comment
#   on:
#     issues:
#       types: [opened]
#   jobs:
#     comment:
#       uses: DataScience4Psych/actions/.github/workflows/autofeedback_instructions.yml@main
#       secrets: inherit
#
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    # Skip bots (e.g. github-classroom[bot]) to avoid comment spam.
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            // 3. Compose and post the comment.
            const author = context.payload.issue.user.login;
            const body = [
              `👋 @${author}`,
              `Thank you for submitting your lab to the right place! It's been added to Prof. Mason's to-grade list. Now she knows that you're ready to receive feedback!` +
              `The autofeedbacker is intended to give you formative (and timely) feedback. It will post your results here shortly. You can see the [source code](https://github.com/DataScience4Psych/DataScience4Psych/tree/main/tests) for yourself. It's a work in progress, so please let me know when it makes mistakes. Once you get your feedback:` +
              `            1. Update your code in your lab repo` +
              `            2. Come back to this issue and comment `/feedback` to run the autofeedbacker again`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body
            });
